spring.application.name=wedbush-reconciliation

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/reconciliation_db
spring.datasource.username=wedbush_user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration

spring.ai.google.genai.api-key=YOUR_API_KEY_HERE
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# SMTP (dummy local server, e.g. MailHog on port 1025)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false

spring.jpa.hibernate.ddl-auto=create-drop

spring.main.headless=false